name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply database schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          for f in $(ls backend/db/init/*.sql | sort); do
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
          APP_ENV: test
          GEN_AI_KEY: test-key-for-ci
          PYTHONPATH: backend
        run: |
          cd backend
          pytest tests/ -v --tb=short

  prod-auth-smoke:
    name: Production Auth Smoke Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply database schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          for f in $(ls backend/db/init/*.sql | sort); do
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run production-mode auth smoke tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
          APP_ENV: production
          GEN_AI_KEY: test-key-for-ci
          PYTHONPATH: backend
        run: |
          cd backend
          pytest tests/test_prod_auth_smoke.py -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t chatvector-api:ci

  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-demo/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend-demo
          npm ci

      - name: Lint and Type-check
        run: |
          cd frontend-demo
          npm run lint
          npm run type-check

      - name: Build
        run: |
          cd frontend-demo
          npm run build

  sdk:
    name: SDK Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install SDK
        run: |
          cd sdk/python
          pip install -e ".[dev]"

      - name: Run SDK tests
        run: |
          cd sdk/python
          pytest tests/ -v --tb=short

  typescript-sdk:
    name: TypeScript SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]

    defaults:
      run:
        working-directory: sdk/typescript

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

      - name: Build package
        run: npm run build

      - name: Test package exports
        run: npm run test:exports
